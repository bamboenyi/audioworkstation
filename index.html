<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bamboenyi Audio Workstation</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel untuk transpiling JSX di browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <!-- Google API Scripts -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #f8fafc; margin: 0; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(251,191,36,0.3); border-radius: 10px; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; height: 16px; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #f59e0b; cursor: pointer; border: 2px solid #000; margin-top: -4px; box-shadow: 0 0 8px rgba(245,158,11,0.3); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 3px; cursor: pointer; background: #1a1a1a; border-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }

        .playhead-line {
            pointer-events: none;
            box-shadow: 0 0 10px #fbbf24, 0 0 3px rgba(251,191,36,0.8);
            z-index: 50;
            width: 2px;
            background-color: #fbbf24;
            height: 100%;
            position: absolute;
            top: 0;
            will-change: left;
        }

        .playhead-marker {
            width: 14px;
            height: 14px;
            background: #fbbf24;
            position: absolute;
            top: -7px;
            left: -6px;
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 60;
        }

        .project-item-active {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.3);
            color: #f59e0b;
        }

        .beat-flash {
            animation: flash 0.1s ease-out;
        }
        @keyframes flash {
            0% { transform: scale(1.1); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import * as Tone from 'https://esm.sh/tone@14.8.49';
        import { 
            Play, Pause, Square, Volume2, Music, Activity, Timer, Trash2, Upload, Headphones, 
            Plus, Loader2, ChevronUp, ChevronDown, Waves, X, Info, RotateCcw, FolderUp, ListMusic, 
            ChevronRight, PanelLeftClose, PanelLeft, Save, Download, RefreshCw, FileJson, Link, Layers,
            Database, AlertTriangle
        } from 'https://esm.sh/lucide-react@0.263.1';

        // --- KONFIGURASI GOOGLE DRIVE (GANTI DENGAN PUNYA ANDA) ---
        // CATATAN: Error "Missing required parameter client_id" muncul karena nilai di bawah ini kosong.
        const CLIENT_ID = '847301076348-id6apqo2aqi041r13tpvu53pdis3dlk4.apps.googleusercontent.com'; // Masukkan Client ID Anda (misal: '12345-abc.apps.googleusercontent.com')
        const API_KEY = 'AIzaSyC8Bcxfn9VjlqB99BTIhv_h48CHJwdAyeU';   // Masukkan API Key Anda
        const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
        const SCOPES = "https://www.googleapis.com/auth/drive.readonly";

        const App = () => {
            const [isPlaying, setIsPlaying] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const [isMetronomeOn, setIsMetronomeOn] = useState(false);
            const [isMetronomeDouble, setIsMetronomeDouble] = useState(true); 
            const [metronomeVolume, setMetronomeVolume] = useState(-12); 
            const [bpm, setBpm] = useState(120);
            const [detectedKey, setDetectedKey] = useState("-");
            const [playbackRate, setPlaybackRate] = useState(1);
            const [transpose, setTranspose] = useState(0); 
            const [currentTime, setCurrentTime] = useState(0);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [isBeatActive, setIsBeatActive] = useState(false);
            const [isPlaylistVisible, setIsPlaylistVisible] = useState(true);
            const [showConfigAlert, setShowConfigAlert] = useState(false);
            
            const [playlistName, setPlaylistName] = useState("Koleksi Baru");
            const [playlist, setPlaylist] = useState([]); 
            const [currentProjectIndex, setCurrentProjectIndex] = useState(-1);
            const [stems, setStems] = useState([]);

            const [driveToken, setDriveToken] = useState(null);

            const players = useRef({}); 
            const volumes = useRef({});
            const solos = useRef({});
            const metronomeEventId = useRef(null);
            const clickSynth = useRef(null);
            const metronomeVolNode = useRef(null);
            const animationRef = useRef(null);
            const tokenClient = useRef(null);

            const masterTrack = useMemo(() => stems.length > 0 ? stems[0] : null, [stems]);

            // --- INISIALISASI AUDIO & GOOGLE DRIVE ---
            useEffect(() => {
                metronomeVolNode.current = new Tone.Volume(metronomeVolume).toDestination();
                clickSynth.current = new Tone.Synth({
                    oscillator: { type: "square8" },
                    envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.05 }
                }).connect(metronomeVolNode.current);

                const syncPlayhead = () => {
                    if (Tone.Transport.state === 'started') {
                        setCurrentTime(Tone.Transport.seconds);
                    }
                    animationRef.current = requestAnimationFrame(syncPlayhead);
                };
                animationRef.current = requestAnimationFrame(syncPlayhead);

                // Inisialisasi GSI hanya jika CLIENT_ID tersedia untuk mencegah error fatal
                if (window.google && CLIENT_ID) {
                    try {
                        tokenClient.current = google.accounts.oauth2.initTokenClient({
                            client_id: CLIENT_ID,
                            scope: SCOPES,
                            callback: (response) => {
                                if (response.error !== undefined) throw response;
                                setDriveToken(response.access_token);
                                createPicker(response.access_token);
                            },
                        });
                    } catch (e) {
                        console.error("Gagal menginisialisasi Google Auth Client:", e);
                    }
                }

                return () => {
                    Tone.Transport.stop();
                    cancelAnimationFrame(animationRef.current);
                    Object.values(players.current).forEach(p => p.dispose());
                    if (metronomeEventId.current !== null) Tone.Transport.clear(metronomeEventId.current);
                };
            }, []);

            // --- GOOGLE DRIVE PICKER LOGIC ---
            const handleDriveAuth = () => {
                // Cek konfigurasi sebelum memproses
                if (!CLIENT_ID || !API_KEY) {
                    setShowConfigAlert(true);
                    return;
                }

                if (driveToken) {
                    createPicker(driveToken);
                } else {
                    if (tokenClient.current) {
                        tokenClient.current.requestAccessToken({ prompt: 'consent' });
                    } else {
                        // Re-inisialisasi jika sebelumnya gagal/terlewat
                        try {
                            tokenClient.current = google.accounts.oauth2.initTokenClient({
                                client_id: CLIENT_ID,
                                scope: SCOPES,
                                callback: (response) => {
                                    if (response.error !== undefined) throw response;
                                    setDriveToken(response.access_token);
                                    createPicker(response.access_token);
                                },
                            });
                            tokenClient.current.requestAccessToken({ prompt: 'consent' });
                        } catch (e) {
                            console.error("GSI Client error:", e);
                            setShowConfigAlert(true);
                        }
                    }
                }
            };

            const createPicker = (token) => {
                if (typeof gapi === 'undefined' || !gapi.load) {
                    console.error("Library GAPI belum dimuat.");
                    return;
                }
                gapi.load('picker', () => {
                    const picker = new google.picker.PickerBuilder()
                        .addView(google.picker.ViewId.FOLDERS)
                        .addView(new google.picker.DocsView().setMimeTypes('audio/*').setSelectFolderEnabled(true))
                        .setOAuthToken(token)
                        .setDeveloperKey(API_KEY)
                        .setCallback(pickerCallback)
                        .build();
                    picker.setVisible(true);
                });
            };

            const pickerCallback = async (data) => {
                if (data.action === google.picker.Action.PICKED) {
                    const doc = data.docs[0];
                    setIsAnalyzing(true);
                    
                    try {
                        if (doc.type === 'folder') {
                            await loadFolderFromDrive(doc.id, doc.name);
                        } else {
                            await loadProjectFromDriveFiles([doc], "Drive Project");
                        }
                    } catch (err) {
                        console.error("Gagal memuat file dari Drive:", err);
                    } finally {
                        setIsAnalyzing(false);
                    }
                }
            };

            const loadFolderFromDrive = async (folderId, folderName) => {
                try {
                    const response = await fetch(
                        `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType+contains+'audio/'&fields=files(id,name,size)&key=${API_KEY}`,
                        { headers: { Authorization: `Bearer ${driveToken}` } }
                    );
                    const result = await response.json();
                    if (result.files && result.files.length > 0) {
                        await loadProjectFromDriveFiles(result.files, folderName);
                    }
                } catch (error) {
                    console.error("Error loading drive folder:", error);
                }
            };

            const loadProjectFromDriveFiles = async (driveFiles, projectName) => {
                const newProject = {
                    name: projectName,
                    driveFiles: driveFiles,
                    bpm: 120,
                    stemsMetadata: []
                };

                setPlaylist(prev => {
                    const updated = [...prev, newProject];
                    loadProject(prev.length, updated);
                    return updated;
                });
            };

            const fetchDriveAudioAsBlob = async (fileId) => {
                const response = await fetch(
                    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
                    { headers: { Authorization: `Bearer ${driveToken}` } }
                );
                if (!response.ok) throw new Error("Gagal mengunduh audio");
                return await response.blob();
            };

            const loadProject = async (index, currentPlaylist = playlist) => {
                if (index < 0 || index >= currentPlaylist.length) return;
                
                setIsAnalyzing(true);
                setCurrentProjectIndex(index);
                const project = currentPlaylist[index];

                if (Tone.context.state !== 'running') await Tone.start();
                Tone.Transport.stop();
                setIsPlaying(false);
                setIsPaused(false);
                Object.values(players.current).forEach(p => p.dispose());
                players.current = {}; volumes.current = {}; solos.current = {};
                setStems([]);
                setCurrentTime(0);

                const newStems = [];
                
                if (project.files) {
                    for (let i = 0; i < project.files.length; i++) {
                        const file = project.files[i];
                        const trackId = `tr-${Date.now()}-${i}`;
                        const buffer = new Tone.ToneAudioBuffer();
                        await buffer.load(URL.createObjectURL(file));
                        initAudioTrack(trackId, buffer);
                        newStems.push({ 
                            id: trackId, type: i === 0 ? 'full' : 'custom', label: file.name.split('.')[0], 
                            color: i === 0 ? 'text-amber-400' : 'text-emerald-400', volume: 0, 
                            muted: false, solo: false, fileName: file.name, loaded: true,
                            duration: buffer.duration, waveform: generateWaveformData(buffer)
                        });
                        if (i === 0) setBpm(detectBPMFromBuffer(buffer));
                    }
                } 
                else if (project.driveFiles) {
                    for (let i = 0; i < project.driveFiles.length; i++) {
                        const file = project.driveFiles[i];
                        const trackId = `tr-drive-${i}`;
                        const buffer = new Tone.ToneAudioBuffer();
                        try {
                            const blob = await fetchDriveAudioAsBlob(file.id);
                            await buffer.load(URL.createObjectURL(blob));
                            initAudioTrack(trackId, buffer);
                            newStems.push({ 
                                id: trackId, type: i === 0 ? 'full' : 'custom', label: file.name.split('.')[0], 
                                color: i === 0 ? 'text-blue-400' : 'text-sky-400', volume: 0, 
                                muted: false, solo: false, fileName: file.name, loaded: true,
                                duration: buffer.duration, waveform: generateWaveformData(buffer)
                            });
                            if (i === 0) setBpm(detectBPMFromBuffer(buffer));
                        } catch (e) { console.error("Gagal memuat track drive:", e); }
                    }
                }
                
                setStems(newStems);
                setIsAnalyzing(false);
            };

            // --- MESIN METRONOM ---
            useEffect(() => {
                if (metronomeEventId.current !== null) Tone.Transport.clear(metronomeEventId.current);
                const interval = "8n";
                metronomeEventId.current = Tone.Transport.scheduleRepeat((time) => {
                    const ticks = Tone.Transport.getTicksAtTime(time);
                    const ppq = Tone.Transport.PPQ;
                    const isOnBeat = Math.abs(ticks % ppq) < 10;
                    if (isOnBeat) {
                        const beatIndex = Math.round(ticks / ppq) % 4;
                        clickSynth.current.triggerAttackRelease(beatIndex === 0 ? "C5" : "G4", "32n", time, beatIndex === 0 ? 1 : 0.5);
                        Tone.Draw.schedule(() => { setIsBeatActive(true); setTimeout(() => setIsBeatActive(false), 50); }, time);
                    }
                }, interval);
            }, [bpm]);

            useEffect(() => { 
                Tone.Transport.bpm.value = bpm * playbackRate; 
                Object.values(players.current).forEach(p => { p.playbackRate = playbackRate; p.detune = transpose * 100; });
                if (metronomeVolNode.current) {
                    metronomeVolNode.current.volume.value = metronomeVolume;
                    metronomeVolNode.current.mute = !isMetronomeOn;
                }
            }, [bpm, playbackRate, transpose, metronomeVolume, isMetronomeOn]);

            const generateWaveformData = (buffer) => {
                const data = buffer.getChannelData(0);
                const segments = 300; 
                const step = Math.floor(data.length / segments);
                const points = [];
                for (let i = 0; i < segments; i++) {
                    let max = 0;
                    for (let j = 0; j < step; j++) {
                        const val = Math.abs(data[(i * step) + j]);
                        if (val > max) max = val;
                    }
                    points.push(Math.min(1, max * 1.5));
                }
                return points;
            };

            const detectBPMFromBuffer = (buffer) => {
                return 120; // Sederhana: 120 default
            };

            const initAudioTrack = (id, buffer, volLevel = 0) => {
                const vol = new Tone.Volume(volLevel).toDestination();
                const solo = new Tone.Solo().connect(vol);
                const player = new Tone.GrainPlayer(buffer).connect(solo);
                player.playbackRate = playbackRate;
                player.detune = transpose * 100;
                player.sync().start(0);
                players.current[id] = player; volumes.current[id] = vol; solos.current[id] = solo;
            };

            const handleSeek = async (e, duration) => {
                if (!duration) return;
                if (Tone.context.state !== 'running') await Tone.start();
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const percent = Math.max(0, Math.min(1, x / rect.width));
                Tone.Transport.seconds = percent * duration;
                setCurrentTime(Tone.Transport.seconds);
            };

            const formatTime = (s) => `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;

            return (
                <div className="flex h-screen bg-[#050505] text-slate-200 font-sans overflow-hidden">
                    
                    {/* MODAL PERINGATAN KONFIGURASI */}
                    {showConfigAlert && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                            <div className="max-w-md w-full bg-[#111] border border-amber-500/30 rounded-2xl p-6 shadow-2xl">
                                <div className="flex items-center gap-3 text-amber-500 mb-4">
                                    <AlertTriangle size={24} />
                                    <h3 className="font-black uppercase tracking-widest text-sm">Konfigurasi Dibutuhkan</h3>
                                </div>
                                <p className="text-xs text-slate-400 leading-relaxed mb-6">
                                    Fitur Google Drive memerlukan <span className="text-white font-bold">Client ID</span> dan <span className="text-white font-bold">API Key</span> dari Google Cloud Console. Silakan buka file <span className="font-mono text-amber-500">index.html</span> dan isi variabel <code className="bg-black/40 px-1 rounded text-amber-400">CLIENT_ID</code> serta <code className="bg-black/40 px-1 rounded text-amber-400">API_KEY</code> pada bagian atas skrip.
                                </p>
                                <button 
                                    onClick={() => setShowConfigAlert(false)}
                                    className="w-full py-2 bg-amber-500 hover:bg-amber-400 text-black font-black uppercase text-[10px] tracking-[0.2em] rounded-xl transition-all"
                                >
                                    Mengerti
                                </button>
                            </div>
                        </div>
                    )}

                    {/* SIDEBAR */}
                    <aside className={`${isPlaylistVisible ? 'w-80' : 'w-0'} transition-all duration-300 bg-black/40 border-r border-white/5 flex flex-col shrink-0 overflow-hidden`}>
                        <div className="p-4 border-b border-white/5 flex items-center justify-between gap-3">
                            <div className="flex items-center gap-3 flex-1 min-w-0">
                                <ListMusic className="text-amber-500 shrink-0" size={20} />
                                <input 
                                    type="text" 
                                    value={playlistName} 
                                    onChange={(e) => setPlaylistName(e.target.value)}
                                    className="bg-transparent font-black text-xs uppercase tracking-[0.2em] outline-none focus:text-amber-400 w-full truncate"
                                />
                            </div>
                            <button onClick={() => setIsPlaylistVisible(false)} className="p-1.5 hover:bg-white/5 rounded text-slate-500">
                                <PanelLeftClose size={16} />
                            </button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                            {playlist.length === 0 ? (
                                <div className="py-10 text-center px-4">
                                    <p className="text-[10px] text-slate-600 uppercase font-bold tracking-widest leading-loose italic">
                                        Playlist Kosong. Masukkan folder dari Drive atau Lokal.
                                    </p>
                                </div>
                            ) : (
                                playlist.map((item, idx) => (
                                    <div key={idx} className={`w-full group rounded-xl border transition-all ${currentProjectIndex === idx ? 'project-item-active' : 'border-transparent hover:bg-white/5'}`}>
                                        <button onClick={() => loadProject(idx)} className="w-full flex items-center justify-between p-3">
                                            <div className="truncate text-left flex-1 min-w-0">
                                                <p className="font-black text-[11px] uppercase truncate tracking-tighter">{item.name}</p>
                                                <p className="text-[8px] opacity-50 uppercase font-bold">{item.driveFiles ? 'Google Drive' : 'Local Storage'}</p>
                                            </div>
                                            <ChevronRight size={14} className={`shrink-0 ${currentProjectIndex === idx ? 'opacity-100' : 'opacity-0'}`} />
                                        </button>
                                    </div>
                                ))
                            )}
                        </div>

                        <div className="p-4 border-t border-white/5 space-y-2">
                            <button onClick={handleDriveAuth} className="w-full py-2.5 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 rounded-xl text-[9px] font-black uppercase tracking-widest border border-blue-500/10 transition-all flex items-center justify-center gap-2">
                                <Database size={14} /> Muat dari Google Drive
                            </button>
                            <label className="w-full py-2.5 bg-white/5 hover:bg-white/10 text-slate-400 rounded-xl text-[9px] font-black uppercase tracking-widest border border-white/5 cursor-pointer transition-all flex items-center justify-center gap-2">
                                <FolderUp size={14} /> Muat Folder Lokal
                                <input type="file" webkitdirectory="true" directory="true" multiple className="hidden" onChange={(e) => {
                                    const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/'));
                                    if(files.length) {
                                        const projName = files[0].webkitRelativePath.split('/')[0] || "New Local Project";
                                        setPlaylist(prev => {
                                            const updated = [...prev, { name: projName, files }];
                                            loadProject(prev.length, updated);
                                            return updated;
                                        });
                                    }
                                }} />
                            </label>
                        </div>
                    </aside>

                    {/* MAIN WORKSTATION */}
                    <div className="flex-1 flex flex-col relative overflow-hidden">
                        <header className="bg-black/95 backdrop-blur-xl border-b border-white/5 p-2 px-4 sticky top-0 z-[100]">
                            <div className="max-w-7xl mx-auto flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    {!isPlaylistVisible && (
                                        <button onClick={() => setIsPlaylistVisible(true)} className="p-2 hover:bg-white/5 rounded-lg text-amber-500 mr-2"><PanelLeft size={20} /></button>
                                    )}
                                    <div className="w-8 h-8 bg-amber-500 rounded flex items-center justify-center shadow-lg"><Headphones className="text-black" size={18} /></div>
                                    <div className="min-w-0">
                                        <h1 className="text-sm font-black text-white uppercase italic truncate">Bamboenyi Workstation</h1>
                                        <p className="text-[6px] text-slate-500 font-bold uppercase tracking-widest truncate">{currentProjectIndex !== -1 ? playlist[currentProjectIndex].name : "SIAP"}</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-1.5 bg-white/[0.02] p-1 rounded-lg border border-white/5 font-bold text-[10px]">
                                    <div className="px-3 py-0.5 border-r border-white/5 text-center"><span className="text-[6px] text-slate-500 block uppercase mb-0.5 tracking-tighter">BPM</span><span className="text-amber-400 text-xs font-mono">{bpm}</span></div>
                                    <div className="px-3 py-0.5 text-center"><span className="text-[6px] text-slate-500 block uppercase mb-0.5 tracking-tighter">Posisi</span><span className="text-slate-200 text-xs font-mono">{formatTime(currentTime)}</span></div>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4 pb-32">
                            {isAnalyzing && (
                                <div className="flex items-center justify-center py-20 gap-3">
                                    <Loader2 className="animate-spin text-amber-500" size={24} />
                                    <p className="text-xs font-black uppercase tracking-widest text-amber-500">Menganalisis Proyek...</p>
                                </div>
                            )}

                            {!isAnalyzing && masterTrack && (
                                <section className="bg-amber-500/5 border border-amber-500/20 rounded-2xl p-4 shadow-2xl relative">
                                    <div className="flex items-center justify-between mb-3 px-1">
                                        <div className="flex items-center gap-2"><Waves size={14} className="text-amber-500" /><h2 className="text-[10px] font-black uppercase tracking-widest text-amber-500">Master Track Overview</h2></div>
                                        <span className="text-[9px] font-mono text-amber-500/50">{formatTime(currentTime)} / {formatTime(masterTrack.duration)}</span>
                                    </div>
                                    <div className="h-16 bg-black/40 rounded-xl relative overflow-hidden cursor-pointer border border-white/5" onClick={(e) => handleSeek(e, masterTrack.duration)}>
                                        <div className="absolute inset-0 flex items-center justify-around px-2 opacity-20">
                                            {masterTrack.waveform.map((peak, i) => (<div key={i} className="w-[1px] bg-amber-500 rounded-full" style={{ height: `${peak * 90}%` }} />))}
                                        </div>
                                        <div className="playhead-line" style={{ left: `${(currentTime / masterTrack.duration) * 100}%` }}><div className="playhead-marker" /></div>
                                    </div>
                                </section>
                            )}

                            <div className="space-y-1.5">
                                {stems.map((track) => (
                                    <div key={track.id} className="bg-white/[0.01] border border-white/5 rounded-xl p-3 flex flex-col lg:flex-row items-center gap-4 group hover:bg-white/[0.03] transition-all">
                                        <div className="w-full lg:w-64 shrink-0">
                                            <div className="flex items-center justify-between mb-1.5">
                                                <div className="flex items-center gap-2 min-w-0 flex-1">
                                                    <div className={`w-7 h-7 bg-black/60 rounded border border-white/5 flex items-center justify-center shrink-0 ${track.color}`}>{track.type === 'full' ? <Waves size={14}/> : <Music size={14}/>}</div>
                                                    <p className="font-black text-[11px] truncate w-full">{track.label}</p>
                                                </div>
                                                <div className="flex gap-1 shrink-0 ml-2">
                                                    <button onClick={() => solos.current[track.id].solo = !solos.current[track.id].solo} className="w-6 h-6 rounded bg-black/40 text-[7px] font-black border border-white/5 text-slate-500">S</button>
                                                    <button onClick={() => volumes.current[track.id].mute = !volumes.current[track.id].mute} className="w-6 h-6 rounded bg-black/40 text-[7px] font-black border border-white/5 text-slate-500">M</button>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <Volume2 size={12} className="text-slate-600" />
                                                <input type="range" min="-60" max="6" value={track.volume} 
                                                    onChange={(e) => {
                                                        const v = parseFloat(e.target.value);
                                                        if (volumes.current[track.id]) volumes.current[track.id].volume.value = v;
                                                        setStems(prev => prev.map(s => s.id === track.id ? { ...s, volume: v } : s));
                                                    }} className="flex-1" />
                                            </div>
                                        </div>

                                        <div className="flex-1 w-full bg-black/60 h-16 rounded border border-white/5 relative overflow-hidden cursor-crosshair group/track" onClick={(e) => handleSeek(e, track.duration)}>
                                            <div className="absolute inset-0 flex items-center justify-between px-4 opacity-25">
                                                {track.waveform && track.waveform.map((peak, pidx) => (<div key={pidx} className={`w-[1px] rounded-full ${track.color.replace('text-', 'bg-')}`} style={{ height: `${Math.max(4, peak * 100)}%` }} />))}
                                            </div>
                                            <div className="playhead-line" style={{ left: `${(currentTime / track.duration) * 100}%` }} />
                                        </div>
                                        <button onClick={() => setStems(prev => prev.filter(s => s.id !== track.id))} className="opacity-0 group-hover:opacity-100 p-2 text-slate-700 hover:text-red-500 transition-all shrink-0"><Trash2 size={14}/></button>
                                    </div>
                                ))}
                                
                                {stems.length === 0 && !isAnalyzing && (
                                    <div className="py-20 text-center opacity-10">
                                        <Layers size={48} className="mx-auto mb-4" />
                                        <p className="font-black text-xs uppercase tracking-widest">Pilih Proyek di Sidebar</p>
                                    </div>
                                )}
                            </div>
                        </main>

                        {/* KONTROL BAWAH */}
                        <div className="absolute bottom-0 left-0 right-0 p-3 z-[100] pointer-events-none">
                            <div className="max-w-4xl mx-auto bg-black/95 backdrop-blur-2xl border border-white/10 rounded-2xl p-2 px-5 shadow-2xl flex flex-col md:flex-row items-center gap-4 md:gap-6 pointer-events-auto">
                                <div className="flex items-center gap-2 bg-white/[0.03] p-1 rounded-lg border border-white/5">
                                    <button onClick={() => { Tone.Transport.stop(); setIsPlaying(false); setIsPaused(false); setCurrentTime(0); }} className="w-7 h-7 text-slate-500 hover:text-white flex items-center justify-center active:scale-90"><Square size={14} fill="currentColor"/></button>
                                    <button onClick={() => { Tone.Transport.pause(); setIsPlaying(false); setIsPaused(true); }} className={`w-7 h-7 rounded flex items-center justify-center ${isPaused ? 'text-amber-400 bg-amber-500/10' : 'text-slate-500'}`}><Pause size={14} fill="currentColor"/></button>
                                    <button onClick={async () => { if (Tone.context.state !== 'running') await Tone.start(); Tone.Transport.start(); setIsPlaying(true); setIsPaused(false); }} className={`w-9 h-9 rounded flex items-center justify-center transition-all ${isPlaying ? 'bg-amber-500 text-black' : 'bg-white/10 text-slate-400'}`}><Play size={18} fill="currentColor" className="ml-0.5"/></button>
                                </div>
                                <div className="flex-1 w-full flex items-center gap-3">
                                    <span className="text-[7px] font-black uppercase text-slate-500">Speed</span>
                                    <input type="range" min="0.5" max="1.5" step="0.01" value={playbackRate} onChange={(e) => setPlaybackRate(parseFloat(e.target.value))} className="flex-1" />
                                    <span className="text-amber-500 font-mono text-[10px]">{Math.round(playbackRate*100)}%</span>
                                </div>
                                <div className="flex items-center gap-4 border-l border-white/10 pl-4">
                                    <div className="flex items-center gap-2 bg-black/60 px-2 py-1 rounded border border-white/5">
                                        <button onClick={() => setTranspose(prev => prev - 1)} className="text-slate-500 hover:text-amber-400"><ChevronDown size={12}/></button>
                                        <span className="font-mono font-black text-amber-400 text-[10px] min-w-[12px]">{transpose > 0 ? `+${transpose}` : transpose}</span>
                                        <button onClick={() => setTranspose(prev => prev + 1)} className="text-slate-500 hover:text-amber-400"><ChevronUp size={12}/></button>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={async () => { if (Tone.context.state !== 'running') await Tone.start(); setIsMetronomeOn(!isMetronomeOn); }} className={`w-7 h-7 rounded border flex items-center justify-center transition-all ${isMetronomeOn ? 'bg-amber-500 text-black' : 'bg-white/5 border-white/5 text-slate-500'} ${isBeatActive ? 'beat-flash' : ''}`}><Activity size={14}/></button>
                                        <div className="flex flex-col gap-0.5"><input type="range" min="-60" max="6" step="1" value={metronomeVolume} onChange={(e) => setMetronomeVolume(parseFloat(e.target.value))} className="w-12 h-1" /></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
